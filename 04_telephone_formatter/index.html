<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Telephone Formatter</title>
  </head>
  <body>
    <h1>Telephone Formatter</h1>
    <div class="container">
      <label for="tele">Phone Number</label>
      <input type="text" placeholder="+(123) 456-7890" id="tele" />
      <p>Enter a 10 digit phone number. Format: +(123) 456-7890</p>
      <p class="err-msg">Please enter a valid 10-digit phone number</p>
    </div>
    <script src="index.js"></script>
  </body>
</html>
